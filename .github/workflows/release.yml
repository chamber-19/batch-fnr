name: Release Backend Service

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-build.txt

      - name: Run backend tests
        run: python -m pytest backend/tests -v

      - name: Start backend service
        run: |
          python -m uvicorn backend.app:app --host 127.0.0.1 --port 8000 > backend.log 2>&1 &
          echo $! > backend.pid
          sleep 4

      - name: Health check
        run: |
          curl --fail http://127.0.0.1:8000/api/health

      - name: Stop backend service
        if: always()
        run: |
          if [ -f backend.pid ]; then kill "$(cat backend.pid)" || true; fi
          cat backend.log || true
