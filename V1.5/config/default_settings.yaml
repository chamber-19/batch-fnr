# Default settings for AutoCAD Text Tools
# This file contains the default configuration that will be loaded on first run

application:
  name: "AutoCAD Text Tools"
  version: "2.0.0"
  author: "Root3Power LLC"
  
  window:
    width: 1400
    height: 900
    min_width: 1200
    min_height: 800
    remember_size: true
    remember_position: true
  
  theme: "dark"
  log_level: "INFO"
  
  autocad:
    connection_timeout: 30
    retry_attempts: 3
    check_interval: 5
    auto_connect: true
    make_visible: true
  
  ui:
    tab_position: "top"  # top, bottom, left, right
    show_toolbar: true
    show_statusbar: true
    show_log: true
    log_max_lines: 1000

plugins:
  auto_load: true
  load_order:
    - "find_replace"
    - "text_unifier" 
    - "scaling_tool"
  
  # Plugin-specific default settings
  find_replace:
    max_replacements: 10
    default_preview: false
    default_recursive: false
    auto_save_reports: true
    
  text_unifier:
    default_style: "R3P"
    default_plot_height: 0.125
    angle_tolerance: 2.0
    gap_factor: 1.5
    detect_columns: true
    
  scaling_tool:
    default_scale_factor: 1.0
    text_only_default: false

# File paths and directories
paths:
  plugins_dir: "plugins"
  config_dir: "config"
  logs_dir: "logs"
  temp_dir: "temp"
  reports_dir: "reports"

# Logging configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_max_size: "10MB"
  file_backup_count: 5
